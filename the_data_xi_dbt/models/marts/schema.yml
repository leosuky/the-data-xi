version: 2

models:
  # ================
  # DIMENSION TABLES
  # ================

  - name: dim_matches
    description: "Core dimension table for matches. One row per match."
    columns:
      - name: match_id
        description: "Unique ID"
        tests:
          - unique
          - not_null

      - name: combo_id
        description: "Natural key: combo_id (e.g., '2023-08-19ManArs')"
        tests:
          - unique
          - not_null

      - name: home_team_id
        description: "FK to dim_teams"
        tests:
          - not_null
          - relationships:
              to: ref('dim_teams')
              field: team_id

      - name: away_team_id
        description: "FK to dim_teams"
        tests:
          - not_null
          - relationships:
              to: ref('dim_teams')
              field: team_id

      - name: match_date
        description: "Date of the match"
        tests:
          - not_null

      - name: referee_id
        description: "Match referee id"
        tests:
          - not_null
          - relationships:
              to: ref('stg_referee')
              field: id

      - name: tournament_id
        description: "Tournament unique id"
        tests:
          - not_null
          - relationships:
              to: ref('stg_tournaments')
              field: tournament_id

      - name: season_id
        description: "Season unique id"
        tests:
          - not_null
          - relationships:
              to: ref('stg_seasons')
              field: id

      - name: home_manager_id
        description: "Home manager unique ID"
        tests:
          - not_null
          - relationships:
              to: ref('stg_managers')
              field: id

      - name: away_manager_id
        description: "Away manager unique ID"
        tests:
          - not_null
          - relationships:
              to: ref('stg_managers')
              field: id

  - name: dim_teams
    description: "Dimension table for teams."
    columns:
      - name: team_id
        description: "Team unique ID"
        tests:
          - unique
          - not_null

      - name: team_name
        tests:
          - not_null

  - name: dim_players
    description: "Dimension table for players."
    columns:
      - name: player_id
        description: "Stable player ID from stg_player_data"
        tests:
          - unique
          - not_null

      - name: player_name
        tests:
          - not_null
      
      - name: birth_date
        tests:
          - not_null


  # =============
  # FACT TABLES
  # =============

  - name: fct_player_stats
    description: "Wide player performance table. One row per player per match."
    config:
      tags: ['player_granularity']
    columns:
      - name: xx_id
        description: "Unique key: MD5(match_id + shirt_number + is_home_team)"
        tests:
          - unique
          - not_null

      - name: match_id
        description: "FK to dim_matches"
        tests:
          - not_null
          - relationships:
              to: ref('dim_matches')
              field: match_id

      - name: combo_id
        description: "Natural FK to dim_matches"
        tests:
          - not_null
          - relationships:
              to: ref('dim_matches')
              field: combo_id

      - name: player_id
        description: "FK to dim_players"
        tests:
          - relationships:
              to: ref('dim_players')
              field: player_id

      - name: team_id
        description: "FK to dim_teams"
        tests:
          - not_null
          - relationships:
              to: ref('dim_teams')
              field: team_id

      - name: position
        description: "Player position (G, D, M, F)"
        tests:
          - accepted_values:
              values: ['G', 'D', 'M', 'F']
              quote: false

      - name: minutes_played
        description: "Minutes played in the match"
        tests:
          - dbt_utils.expression_is_true:
              expression: "minutes_played >= 0"
          - dbt_utils.expression_is_true:
              expression: "minutes_played <= 120"

      - name: xG
        description: "Expected goals"
        tests:
          - dbt_utils.expression_is_true:
              expression: "xG >= 0"

      - name: goals_scored
        description: "Actual goals scored"
        tests:
          - dbt_utils.expression_is_true:
              expression: "goals_scored >= 0"

      - name: shirt_number
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "shirt_number > 0"


  - name: fct_team_stats
    description: "Team-level performance metrics. One row per team per match."
    config:
      tags: ['team_granularity']
    columns:
      - name: xx_id
        description: "Unique key: MD5(match_id + team_id)"
        tests:
          - unique
          - not_null

      - name: match_idx
        tests:
          - not_null
          - relationships:
              to: ref('dim_matches')
              field: match_id

      - name: combo_idx
        description: "Natural FK to dim_matches"
        tests:
          - not_null
          - relationships:
              to: ref('dim_matches')
              field: combo_id

      - name: is_home_team
        tests:
          - not_null
          - accepted_values:
              values: [true, false]


  - name: fct_shots
    description: "Event-level shot data. One row per shot."
    config:
      tags: ['event_granularity']
    columns:
      - name: id
        description: "Globally unique shot ID"
        tests:
          - unique
          - not_null

      - name: match_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_matches')
              field: match_id

      - name: combo_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_matches')
              field: combo_id

      - name: player_id
        tests:
          - relationships:
              to: ref('dim_players')
              field: player_id

      - name: xg
        tests:
          - dbt_utils.expression_is_true:
              expression: "xg >= 0 AND xg <= 1.0"


  - name: fct_odds
    description: "Betting odds per match. One row per match."
    columns:
      - name: match_id
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('dim_matches')
              field: match_id


# ================
# Custom Generic Tests
# ================
# Add these to your macros/ if you haven't already
# (dbt_utils.expression_is_true is a generic test)
